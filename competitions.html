<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Competitions | Intence Media Professional Photography</title>
  <meta name="description" content="Capture the action of your karate competition with professional photography services by Intence Media. High-quality images to preserve your special moments." />
  <link rel="stylesheet" href="/static/main.css" />
  <style>
    /* General Reset */
    body, h1, h2, h3, p, ul {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #f9f9f9;
      color: #333;
      overflow-x: hidden; /* Prevent horizontal scroll */
    }

    /* Header Styling */
    header {
      position: relative;
      background-color: #fff;
      color: black;
      margin-top: 0px;
      margin-bottom: 0px;
      margin-top: -25px;
    }

    /* Navigation */
    header nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background-color: white;
      padding: 0px 0px;
      margin-top: 0px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap; /* So it can wrap on smaller screens */
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .logo {
      height: 110px; /* Adjust as needed */
    }
    .nav-links a {
      color: black;
      font-size: 1.2rem;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
    }

    .nav-links a:hover {
      color: lightgray;
    }

     /* Highlight Images Section */
     .highlight-images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); /* Grid layout */
      gap: 20px;
      padding: 20px;
    }

    .highlight-images img {
      width: 100%; /* Ensure images fill their container */
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s;
    }

    .highlight-images img:hover {
      transform: scale(1.03);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #999;
      background-color: #fff;
      border-top: 1px solid #eee;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .highlight-images img {
        width: 90%; /* Makes images larger on smaller screens */
        grid-template-columns: 1fr; /* Single column on smaller screens */
      }
      .nav-links a {
        font-size: 1rem;
        margin-left: 10px;
      }
    }

  </style>
</head>
<body>
  <header>
    <h1>Intence Media</h1>
    <nav>
      <a href="/IntenceMedia/"><img src="https://res.cloudinary.com/dfqreujbo/image/upload/v1743371665/Intence_Detailing_sabanc.png" alt="Logo" class="logo" /></a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="gallery">Gallery</a>
        <a href="competitions">Competitions</a>
      </div>
    </nav>

  <main>

    <section class="highlight-images">

        </a>
        <a href="competition2.html">

        </a>

        </a>
        <a href="competitions1">
          <img src="https://images.squarespace-cdn.com/content/v1/659d99fddec69b620cf92ec0/f2397706-9387-4c08-97c3-7fe0b19b9fad/dsfg.png?format=1500w" alt="Competition 1" />

</html>
