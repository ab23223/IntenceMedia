<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Work | Your Name | Professional Photographer</title>
  <style>
    /* Reset some basic elements */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
        margin: 0;
      }
      
      /* Navigation Bar */
      nav {
        position: fixed;
        top: 0;
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem 5%;
        transition: background-color 0.3s;
        z-index: 1000;
      }
      
      nav.scrolled {
        background-color: rgba(255, 255, 255, 0.9);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      
      nav a {
        text-decoration: none;
        color: #333;
        margin: 0 1rem;
        font-weight: bold;
      }
      
      nav a:hover {
        color: #555;
      }
      
      /* Hero Section */
      .hero {
        height: 100vh;
        background: url('https://images.squarespace-cdn.com/content/v1/564e5f84e4b0e21822e30fe3/d7fb2592-78dd-48d4-b03e-95f505643021/_A117311.jpg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        position: relative;
      }
      
      .hero::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
      }
      
      .hero-content {
        position: relative;
        z-index: 1;
      }
      
      .hero h1 {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      
      .logo img{
        width: 100px;
      }
      
      .hero p {
        font-size: 1.5rem;
        margin-bottom: 2rem;
      }
      
      .btn {
        display: inline-block;
        padding: 0.75rem 1.5rem;
        background: #333;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        transition: background 0.3s;
      }
      
      .btn:hover {
        background: #555;
      }
      
      /* Our Services Section */
      .services {
        padding: 5% 10%;
        padding-top: 150px;
        background-color: #f4f4f4;
        display: flex;
        justify-content: space-between;  /* Aligns text and image side by side */
        align-items: center;            /* Vertically centers the content */
        flex-wrap: wrap;                /* Allows the items to wrap on smaller screens */
      }
      
      .services .text {
        flex: 1;                       /* Allows the text to take equal space */
        text-align: left;
        margin-right: 2rem;            /* Adds space between text and image */
      }
      
      .services .text h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      
      .services .text p {
        font-size: 1.2rem;
        margin-bottom: 2rem;
        color: #666;
      }
      
      .services .image {
        flex: 1;                       /* Allows the image to take equal space */
        text-align: center;
      }
      
      .services .image img {
        width: 80%;
        height: auto;
      }
      
      /* New Text and Image Section */
      .text-image {
        padding: 5% 10%;
        background-color: #f4f4f4;
        display: flex;
        justify-content: space-between;  /* Aligns text and image side by side */
        align-items: center;            /* Vertically centers the content */
        flex-wrap: wrap;                /* Allows the items to wrap on smaller screens */
      }
      
      .text-image .text {
        flex: 1;                       /* Allows the text to take equal space */
        text-align: left;
        margin-right: 2rem;            /* Adds space between text and image */
      }
      
      .text-image .text h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      
      .text-image .text p {
        font-size: 1.2rem;
        margin-bottom: 2rem;
        color: #666;
      }
      
      .text-image .image {
        flex: 1;                       /* Allows the image to take equal space */
        text-align: center;
      }
      
      .text-image .image img {
        width: 80%;
        height: auto;
      }
      
      /* Portfolio Section */
      .portfolio {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1rem;
        padding: 5%;
        background: #f4f4f4;
      }
      
      .portfolio-item {
        position: relative;
        overflow: hidden;
      }
      
      .portfolio-item img {
        width: 100%;
        display: block;
        transition: transform 0.3s;
      }
      
      .portfolio-item .overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 1.5rem;
        font-weight: bold;
        z-index: 1;
      }
      
      /* Hero Section for Packages */
      .packages-hero {
        height: 80vh;
        background: url('https://images.squarespace-cdn.com/content/v1/564e5f84e4b0e21822e30fe3/d7fb2592-78dd-48d4-b03e-95f505643021/_A117311.jpg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        position: relative;
      }
      
      .packages-hero::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
      }
      
      .packages-hero-content {
        position: relative;
        z-index: 1;
      }
      
      .packages-hero h1 {
        font-size: 3.5rem;
        margin-bottom: 1rem;
      }
      
      .packages-hero p {
        font-size: 1.5rem;
        margin-bottom: 2rem;
      }
      
      /* View Our Work Section */
      .view-work-hero {
        height: 80vh;
        background: url('https://images.squarespace-cdn.com/content/v1/564e5f84e4b0e21822e30fe3/d7fb2592-78dd-48d4-b03e-95f505643021/_A117311.jpg') no-repeat center center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: white;
        position: relative;
      }
      
      .view-work-hero::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
      }
      
      .view-work-hero-content {
        position: relative;
        z-index: 1;
      }
      
      .view-work-hero h1 {
        font-size: 3.5rem;
        margin-bottom: 1rem;
      }
      
      .view-work-hero p {
        font-size: 1.5rem;
        margin-bottom: 2rem;
      }
      
      /* Footer */
      footer {
        text-align: center;
        padding: 2rem 0;
        background: #333;
        color: white;
      }
      
      footer a {
        color: white;
        margin: 0 0.5rem;
        text-decoration: none;
      }
      
      footer a:hover {
        text-decoration: underline;
      }
      
      /* Add responsiveness */
      @media (max-width: 768px) {
        /* Stack the text and image on smaller screens */
        .services, .text-image {
          flex-direction: column;   /* Stacks text and image vertically */
        }
      
        .services .text, .text-image .text {
          margin-right: 0;
          margin-bottom: 2rem;      /* Adds space between text and image when stacked */
        }
      
        .services .image, .text-image .image {
          width: 100%;              /* Image takes full width */
          text-align: center;
        }
      }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav id="navbar">
    <div class="logo">
      <a href="index.html"><img src="https://res.cloudinary.com/dfqreujbo/image/upload/v1743371665/Intence_Detailing_sabanc.png" alt="Logo"></a>
    </div>
    <div>
      <a href="#portfolio">Portfolio</a>
      <a href="#services">Services</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="view-work-hero">
    <div class="view-work-hero-content">
      <h1>Our Work</h1>
      <p>See the results of our work across various photography categories.</p>
    </div>
  </section>

  <!-- Portfolio Section -->
  <section id="portfolio" class="portfolio">
    <div class="portfolio-item">
      <img src="https://example.com/work1.jpg" alt="Work 1">
      <div class="overlay">Sports Event</div>
    </div>
    <div class="portfolio-item">
      <img src="https://example.com/work2.jpg" alt="Work 2">
      <div class="overlay">Portraits</div>
    </div>
    <div class="portfolio-item">
      <img src="https://example.com/work3.jpg" alt="Work 3">
      <div class="overlay">Weddings</div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Your Name. All Rights Reserved.</p>
    <div>
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
    </div>
  </footer>

</body>
</html>
