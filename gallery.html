<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Intence Media</title>
  <link rel="stylesheet" href="/static/main.css" />
  <style>
    header {
      position: relative;
      background-color: #fff;
      color: black;
      margin-top: 0px;
      margin-bottom: 0px;
      margin-top: -25px;
    }

    /* Navigation */
    header nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background-color: white;
      padding: 0px 0px;
      margin-top: 0px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap; /* So it can wrap on smaller screens */
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .logo {
      height: 110px; /* Adjust as needed */
    }
    .nav-links a {
      color: black;
      font-size: 1.2rem;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
    }

    .nav-links a:hover {
      color: lightgray;
    }

  </style>
</head>
<body>
  <header>
    <h1>Intence Media</h1>
    <nav>
      <img src="https://res.cloudinary.com/dfqreujbo/image/upload/v1743371665/Intence_Detailing_sabanc.png" alt="Logo" class="logo" />
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="gallery">Gallery</a>
        <a href="competitions">Competitions</a>
      </div>
    </nav>    
  </header>

  <main>
    <section class="intro">
      <h2>Gallery</h2>
      <p>A deeper look into the passion, power, and precision of karate.</p>
    </section>

    <section class="highlights">
      <img src="https://res.cloudinary.com/dfqreujbo/image/upload/v1743371665/Intence_Detailing_sabanc.png" alt="Gallery image 1">
      <img src="https://res.cloudinary.com/dfqreujbo/image/upload/v1743371665/Intence_Detailing_sabanc.png" alt="Gallery image 2">
      <img src="https://res.cloudinary.com/dfqreujbo/image/upload/v1743371665/Intence_Detailing_sabanc.png" alt="Gallery image 3">
      <!-- Add more images as needed -->
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Karate Photography. All rights reserved.</p>
  </footer>
</body>
</html>
