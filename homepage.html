<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intence Media | Karate Photography</title>
  <style>
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      font-family: 'Helvetica Neue', sans-serif;
      background-color: #f9f9f9;
      color: #333;
    }

    header {
      position: relative;
      background-color: #fff;
      color: black;
      margin-top: 0px;
      margin-bottom: 0px;
      margin-top: -25px;
    }

    /* Navigation */
    header nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background-color: white;
      padding: 0px 0px;
      margin-top: 0px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap; /* So it can wrap on smaller screens */
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .logo {
      height: 110px; /* Adjust as needed */
    }
    .nav-links a {
      color: black;
      font-size: 1.2rem;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 600;
    }

    .nav-links a:hover {
      color: lightgray;
    }

    main {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    .intro {
      text-align: center;
    }

    .intro h2 {
      font-size: 1.8em;
      margin-bottom: 10px;
    }

    .intro p {
      font-size: 1em;
      color: #666;
      margin-bottom: 30px;
    }

    .highlight-images {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .highlight-images img {
      width: 300px;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s;
    }

    .highlight-images img:hover {
      transform: scale(1.03);
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9em;
      color: #999;
      background-color: #fff;
      border-top: 1px solid #eee;
    }

    @media (max-width: 600px) {
      .highlight-images {
        flex-direction: column;
        align-items: center;
      }

      .highlight-images img {
        width: 90%;
      }
    }

  </style>
</head>
<body>
  <header>
    <h1>Intence Media</h1>
    <nav>
      <img src="/static/INTEC MEDIA1.png" alt="Logo" class="logo" />
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="gallery">Gallery</a>
        <a href="competitions">Competitions</a>
      </div>
    </nav>    
  </header>
  
  
  <main>
    <section class="intro">
      <h2>Intence Media</h2>
      <p>Professional photography for karate competitions. Affordable, Professional and Memorable.</p>
      <div class="highlight-images">
        <img src="/static/INTEC MEDIA1.png" alt="Karate Highlight 1" />
        <img src="/static/INTEC MEDIA1.png" alt="Karate Highlight 2" />
        <img src="/static/INTEC MEDIA1.png" alt="Karate Highlight 3" />
      </div>
    </section>
  </main>
  <footer>
    <p>&copy; 2025 Karate Event Photography</p>
  </footer>
</body>
</html>
